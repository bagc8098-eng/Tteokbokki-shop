<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>슈의 떡볶이 가게</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        body { font-family: 'Jua', sans-serif; background-color: #fdf2f8; }
        .pot { transition: all 0.3s ease; }
        .pot-cooking { animation: bubble 0.5s infinite alternate; }
        @keyframes bubble {
            from { transform: translateY(0); }
            to { transform: translateY(-5px); }
        }
        .dragging { opacity: 0.5; }
        .drop-zone-hover { border-color: #ec4899 !important; background-color: #fce7f3 !important; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 50;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-2xl w-full bg-white rounded-3xl shadow-xl overflow-hidden border-4 border-pink-200 relative">
        <div class="bg-pink-400 p-4 text-center text-white text-3xl font-bold flex justify-between items-center">
            <span>슈의 떡볶이 가게</span>
            <div class="flex items-center gap-4">
                <div class="bg-pink-600 px-4 py-1 rounded-full text-lg">💰 <span id="money">0</span>원</div>
                <button onclick="toggleShop()" class="bg-yellow-400 p-2 rounded-full text-2xl hover:bg-yellow-500">🏪</button>
            </div>
        </div>

        <div id="message-box" class="text-center text-pink-600 font-bold py-2 h-8"></div>

        <div id="ingredients-bar" class="grid grid-cols-5 gap-2 p-4 bg-pink-50 border-b-4 border-pink-200 text-sm">
            <div draggable="true" ondragstart="handleDragStart(event, 'water')" class="cursor-grab bg-blue-100 p-2 rounded-xl text-center hover:bg-blue-200 border-2 border-blue-300">💧<br>물</div>
            <div id="tteok-slot" draggable="true" ondragstart="handleDragStart(event, 'tteok')" class="cursor-grab bg-orange-100 p-2 rounded-xl text-center hover:bg-orange-200 border-2 border-orange-300">🍚<br>떡</div>
            <div id="gochujang-slot" draggable="true" ondragstart="handleDragStart(event, 'gochujang')" class="cursor-grab bg-red-100 p-2 rounded-xl text-center hover:bg-red-200 border-2 border-red-300">🌶️<br>고추장</div>
            <div id="pa-slot" draggable="true" ondragstart="handleDragStart(event, 'pa')" class="cursor-grab bg-green-100 p-2 rounded-xl text-center hover:bg-green-200 border-2 border-green-300">🌿<br>파</div>
            <div id="egg-slot" draggable="true" ondragstart="handleDragStart(event, 'egg')" class="cursor-grab bg-yellow-100 p-2 rounded-xl text-center hover:bg-yellow-200 border-2 border-yellow-300">🥚<br>달걀</div>
        </div>

        <div class="p-8 flex justify-between gap-4">
            <div id="pot-0" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 0)" onclick="handlePotClick(0)" class="pot flex flex-col items-center cursor-pointer w-1/3 p-4 rounded-2xl bg-gray-50 border-4 border-gray-200">
                <div class="text-4xl">🥘</div>
                <div class="text-xs h-16 mt-2 text-center" id="status-0">빈 냄비</div>
            </div>
            <div id="pot-1" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 1)" onclick="handlePotClick(1)" class="pot flex flex-col items-center cursor-pointer w-1/3 p-4 rounded-2xl bg-gray-50 border-4 border-gray-200">
                <div class="text-4xl">🥘</div>
                <div class="text-xs h-16 mt-2 text-center" id="status-1">빈 냄비</div>
            </div>
            <div id="pot-2" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event, 2)" onclick="handlePotClick(2)" class="pot flex flex-col items-center cursor-pointer w-1/3 p-4 rounded-2xl bg-gray-50 border-4 border-gray-200">
                <div class="text-4xl">🥘</div>
                <div class="text-xs h-16 mt-2 text-center" id="status-2">빈 냄비</div>
            </div>
        </div>
    </div>

    <div id="shop-modal" class="modal">
        <div class="bg-white p-8 rounded-3xl w-96 max-w-full m-4 shadow-2xl border-4 border-pink-300">
            <h2 class="text-2xl font-bold text-center mb-6 text-pink-600">재료 상점</h2>
            <div class="grid grid-cols-2 gap-4 text-sm">
                <div id="buy-rose" onclick="buyItem('rose', 6000)" class="cursor-pointer p-3 bg-purple-100 border-2 border-purple-300 rounded-xl text-center hover:bg-purple-200">🥣 로제(6000원)<br><span class="text-xs text-purple-600 font-bold">고추장 대체</span></div>
                <div id="buy-bommusa" onclick="buyItem('bommusa', 3500)" class="cursor-pointer p-3 bg-orange-200 border-2 border-orange-400 rounded-xl text-center hover:bg-orange-300">🥢 분모자(3500원)<br><span class="text-xs text-orange-700 font-bold">떡 대체</span></div>
                <div id="buy-eomuk" onclick="buyItem('eomuk', 4000)" class="cursor-pointer p-3 bg-yellow-200 border-2 border-yellow-400 rounded-xl text-center hover:bg-yellow-300">🍢 어묵(4000원)<br><span class="text-xs text-yellow-700 font-bold">달걀 대체</span></div>
                <div id="buy-sausage" onclick="buyItem('sausage', 5000)" class="cursor-pointer p-3 bg-red-100 border-2 border-red-300 rounded-xl text-center hover:bg-red-200">🌭 소세지(5000원)<br><span class="text-xs text-red-600 font-bold">파 대체</span></div>
                <div id="buy-auto-water" onclick="buyItem('autoWater', 10000)" class="cursor-pointer p-3 bg-blue-100 border-2 border-blue-300 rounded-xl text-center hover:bg-blue-200 col-span-2">🤖 물 넣기 알바(10000원)</div>
                <div id="buy-ending" onclick="buyItem('ending', 50000)" class="cursor-pointer p-3 bg-pink-100 border-2 border-pink-300 rounded-xl text-center hover:bg-pink-200 col-span-2 font-bold">🏆 떡볶이 달인 엔딩(50000원)</div>
            </div>
            <button onclick="toggleShop()" class="w-full mt-6 bg-pink-500 text-white py-2 rounded-xl hover:bg-pink-600">닫기</button>
        </div>
    </div>

    <div id="ending-modal" class="modal">
        <div class="bg-white p-8 rounded-3xl w-80 shadow-2xl text-center border-4 border-yellow-400">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-bold text-pink-600 mb-2">떡볶이 달인 등극!</h2>
            <p class="text-gray-600 mb-6">당신은 이제 전설의 떡볶이 요리사입니다!</p>
            <button onclick="location.reload()" class="bg-yellow-400 px-6 py-2 rounded-full font-bold">처음부터 다시하기</button>
        </div>
    </div>

    <script>
        let money = 0; 
        let unlockedItems = [];
        let autoWaterEnabled = false;
        
        const pots = [
            { ingredients: [], status: 'empty', burnTimer: null, serveTimer: null },
            { ingredients: [], status: 'empty', burnTimer: null, serveTimer: null },
            { ingredients: [], status: 'empty', burnTimer: null, serveTimer: null }
        ];

        function showMessage(msg) {
            const mb = document.getElementById('message-box');
            mb.innerText = msg;
            setTimeout(() => mb.innerText = "", 2000);
        }

        function toggleShop() {
            const modal = document.getElementById('shop-modal');
            modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        }

        function buyItem(item, price) {
            if (money >= price && !unlockedItems.includes(item)) {
                money -= price;
                unlockedItems.push(item);
                document.getElementById('money').innerText = money;
                
                if (item === 'rose') {
                    const slot = document.getElementById('gochujang-slot');
                    slot.innerHTML = "🥣<br>로제";
                    slot.ondragstart = (e) => handleDragStart(e, 'rose');
                    document.getElementById('buy-rose').innerHTML = "🥣 로제<br><span class='text-xs text-red-500 font-bold'>매진</span>";
                    document.getElementById('buy-rose').onclick = null;
                } else if (item === 'bommusa') {
                    const slot = document.getElementById('tteok-slot');
                    slot.innerHTML = "🥢<br>분모자";
                    slot.ondragstart = (e) => handleDragStart(e, 'bommusa');
                    document.getElementById('buy-bommusa').innerHTML = "🥢 분모자<br><span class='text-xs text-red-500 font-bold'>매진</span>";
                    document.getElementById('buy-bommusa').onclick = null;
                } else if (item === 'eomuk') {
                    const slot = document.getElementById('egg-slot');
                    slot.innerHTML = "🍢<br>어묵";
                    slot.ondragstart = (e) => handleDragStart(e, 'eomuk');
                    document.getElementById('buy-eomuk').innerHTML = "🍢 어묵<br><span class='text-xs text-red-500 font-bold'>매진</span>";
                    document.getElementById('buy-eomuk').onclick = null;
                } else if (item === 'sausage') {
                    const slot = document.getElementById('pa-slot');
                    slot.innerHTML = "🌭<br>소세지";
                    slot.ondragstart = (e) => handleDragStart(e, 'sausage');
                    document.getElementById('buy-sausage').innerHTML = "🌭 소세지<br><span class='text-xs text-red-500 font-bold'>매진</span>";
                    document.getElementById('buy-sausage').onclick = null;
                } else if (item === 'autoWater') {
                    autoWaterEnabled = true;
                    document.getElementById('buy-auto-water').innerHTML = "🤖 물 넣기 알바<br><span class='text-xs text-red-500 font-bold'>고용 완료</span>";
                    document.getElementById('buy-auto-water').onclick = null;
                } else if (item === 'ending') {
                    document.getElementById('ending-modal').style.display = 'flex';
                }
                showMessage("구매 완료!");
            } else if (unlockedItems.includes(item)) {
                showMessage("이미 구매했습니다.");
            } else {
                showMessage("돈이 부족합니다!");
            }
        }

        function handleDragStart(e, ing) {
            e.dataTransfer.setData("ingredient", ing);
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('drop-zone-hover');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('drop-zone-hover');
        }

        function handleDrop(e, index) {
            e.preventDefault();
            e.currentTarget.classList.remove('drop-zone-hover');
            const ing = e.dataTransfer.getData("ingredient");
            addIngredient(index, ing);
        }

        function handlePotClick(index) {
            const pot = pots[index];
            if (pot.status === 'burnt') {
                resetPot(index);
            } else if (pot.status === 'ready') {
                servePot(index);
            }
        }

        function resetPot(index) {
            clearTimeout(pots[index].burnTimer);
            clearTimeout(pots[index].serveTimer);
            pots[index] = { ingredients: [], status: 'empty', burnTimer: null, serveTimer: null };
            updateUI(index);
            
            if (autoWaterEnabled) {
                setTimeout(() => addIngredient(index, 'water'), 100);
            }
        }

        function addIngredient(index, ing) {
            const pot = pots[index];
            
            if (pot.status === 'empty' || pot.status === 'cooking') {
                // If cooking, can add extra ingredients (pa/egg/sausage/eomuk/etc)
                if (pot.status === 'cooking' && ['water', 'tteok', 'gochujang', 'rose', 'bommusa'].includes(ing)) return;

                if (!pot.ingredients.includes(ing)) {
                    pot.ingredients.push(ing);
                }

                // If adding the VERY first ingredient, start the 2s global prep timer
                if (pot.ingredients.length === 1 && pot.status === 'empty') {
                    pot.burnTimer = setTimeout(() => {
                        pot.status = 'burnt';
                        updateUI(index);
                    }, 2000); // 2000ms strictly to finish recipe
                }
                
                checkCooking(index);
                updateUI(index);
            }
        }

        function checkCooking(index) {
            const pot = pots[index];
            const hasWater = pot.ingredients.includes('water');
            const hasBaseStarch = pot.ingredients.includes('tteok') || pot.ingredients.includes('bommusa');
            const hasBaseSauce = pot.ingredients.includes('gochujang') || pot.ingredients.includes('rose');

            if (hasWater && hasBaseStarch && hasBaseSauce && pot.status !== 'cooking') {
                clearTimeout(pot.burnTimer); 
                pot.status = 'cooking';
                document.getElementById(`pot-${index}`).classList.add('pot-cooking');
                
                setTimeout(() => {
                    if (pot.status === 'cooking') {
                        pot.status = 'ready';
                        document.getElementById(`pot-${index}`).classList.remove('pot-cooking');
                        
                        pot.serveTimer = setTimeout(() => {
                            if (pot.status === 'ready') {
                                pot.status = 'burnt';
                                updateUI(index);
                            }
                        }, 1500);
                        
                        updateUI(index);
                    }
                }, 2000); // 2000ms cooking duration
            }
        }

        function calculatePrice(pot) {
            let price = 1000;
            if (pot.ingredients.includes('pa')) price += 500;
            if (pot.ingredients.includes('egg')) price += 500;
            if (pot.ingredients.includes('sausage')) price += 750;
            if (pot.ingredients.includes('eomuk')) price += 450;
            if (pot.ingredients.includes('rose')) price += 800;
            if (pot.ingredients.includes('bommusa')) price += 400;
            return price;
        }

        function updateUI(index) {
            const pot = pots[index];
            const el = document.getElementById(`status-${index}`);
            const container = document.getElementById(`pot-${index}`);
            
            if (pot.status === 'ready') {
                el.innerHTML = `완성! (${calculatePrice(pot)}원)<br><span class="text-pink-600 font-bold">1.5초 내 클릭!</span>`;
                container.classList.remove('bg-red-200');
            } else if (pot.status === 'cooking') {
                el.innerHTML = `요리 중...<br>가격: ${calculatePrice(pot)}원`;
                container.classList.remove('bg-red-200');
            } else if (pot.status === 'burnt') {
                el.innerHTML = `<span class="text-red-500 font-bold">타버렸어요!</span><br>(클릭해서 청소)`;
                container.classList.add('bg-red-200');
            } else {
                el.innerText = pot.ingredients.length > 0 ? `준비 중: ${pot.ingredients.length}개` : "빈 냄비";
                container.classList.remove('bg-red-200');
            }
        }

        function servePot(index) {
            if (pots[index].status === 'ready') {
                clearTimeout(pots[index].serveTimer);
                money += calculatePrice(pots[index]);
                document.getElementById('money').innerText = money;
                resetPot(index);
            }
        }
    </script>
</body>
</html>
